<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}Ascend{% endblock %}
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link href="{{ url_for('static', filename='css/style.css') }}"
          rel="stylesheet">

    <link rel="stylesheet"
      href="{{ url_for('static', filename='css/sidebar.css') }}">      

    {% block extra_css %}
    {% endblock %}      
</head>

<body>

<div class="ascend-app-shell">

    {% include "sidebar.html" %}

    <main class="ascend-app-main">

        {% block content %}
        {% endblock %}

    </main>

</div>

<script src="{{ url_for('static', filename='js/sfx.js') }}"></script>
</body>
</html>
