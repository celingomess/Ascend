<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}Ascend{% endblock %}
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link href="{{ url_for('static', filename='css/style.css') }}"
          rel="stylesheet">

    <link rel="stylesheet"
      href="{{ url_for('static', filename='css/sidebar.css') }}">      

    {% block extra_css %}
    {% endblock %}      
</head>

<body>

<div class="ascend-app-shell">

    {% include "sidebar.html" %}

    <main class="ascend-app-main">

        {% block content %}
        {% endblock %}

    </main>

</div>

<!-- Barra de navegação flutuante inferior para mobile -->
<nav class="mobile-bottom-nav">
    <a href="/dashboard" class="mobile-nav-item {% if request.path == '/dashboard' %}active{% endif %}">
        <i class="bi bi-house-door"></i>
        <span>Início</span>
    </a>
    <a href="/metas" class="mobile-nav-item {% if request.path.startswith('/metas') %}active{% endif %}">
        <i class="bi bi-compass"></i>
        <span>Jornadas</span>
    </a>
    <a href="/conquistas" class="mobile-nav-item {% if request.path == '/conquistas' %}active{% endif %}">
        <i class="bi bi-award"></i>
        <span>Legado</span>
    </a>
    <a href="/hall" class="mobile-nav-item {% if request.path == '/hall' %}active{% endif %}">
        <i class="bi bi-gem"></i>
        <span>Hall</span>
    </a>
    <a href="/perfil" class="mobile-nav-item {% if request.path == '/perfil' %}active{% endif %}">
        <i class="bi bi-person"></i>
        <span>Perfil</span>
    </a>
</nav>

<script src="{{ url_for('static', filename='js/sfx.js') }}"></script>
</body>
</html>
