<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ascend</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>

<body>

<div class="container auth-shell">
    <div class="row justify-content-center w-100">
        <div class="col-md-5">

            <div class="auth-card">

                <div class="logo-container">
                    <svg class="ascend-logo-svg" viewBox="0 0 500 300">
                        <path
                            class="logo-line"
                            d="M180 230 L250 70 L320 230" />

                        <path
                            class="logo-accent"
                            d="M165 220 C220 175, 280 155, 340 120" />
                    </svg>

                    <h1 class="logo-title">ASCEND</h1>

                    <p class="logo-subtitle">
                        Progresso com classe.
                    </p>

                    <div class="logo-shine"></div>
                </div>

                <form method="POST" action="/login">

                    <div class="mb-3">
                        <label class="form-label">E-mail</label>
                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="Digite seu e-mail"
                            required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Senha</label>
                        <input
                            type="password"
                            name="senha"
                            class="form-control"
                            placeholder="Digite sua senha"
                            required>
                    </div>

                    <button type="submit" class="btn btn-ascend w-100">
                        Entrar
                    </button>

                </form>

                <hr>

                <p class="text-center mb-0">
                    Ainda não possui conta?
                    <a href="/cadastro" class="gold-text fw-bold text-decoration-none">
                        Criar Conta
                    </a>
                </p>

            </div>

        </div>
    </div>
</div>

</body>
</html>
